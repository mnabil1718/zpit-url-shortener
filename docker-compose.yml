services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/app/data
    environment:
      - APP_ENV=production
      - DB_PATH=/app/data/data.db
      - HOST="http://localhost:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sqlite_data:
