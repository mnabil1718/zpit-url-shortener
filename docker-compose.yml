services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/app/data
    environment:
      - APP_ENV=production
      - PORT=8080
      - DB_PATH=/app/data/data.db
      - HOST=http://localhost:8080
      - REDIS_URL=redis:6379
    restart: unless-stopped
