{{ define "counter-base" }}
  <!doctype html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta
        name="htmx-config"
        content='{"responseHandling": [{"code":".*", "swap": true}]}'
      />
      <title>{{ block "counter-title" . }}URL Shortener{{ end }}</title>
      <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
      <link href="/static/output.css" rel="stylesheet" />
      <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>
    </head>
    <body>
      <div class="min-h-screen flex flex-col bg-slate-50 text-slate-600">
        <main class="flex-1 flex flex-col justify-center items-center">
          {{ block "counter-content" . }}{{ end }}
        </main>
        <footer
          class="border-t border-slate-300 p-3 text-sm text-slate-400 text-center"
        >
          Copyright &copy 2026 Zp.it Built with go + htmx.
        </footer>
      </div>
    </body>
  </html>
{{ end }}
