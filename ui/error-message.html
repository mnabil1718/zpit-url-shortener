{{ define "error-message" }}
  {{ if . }}
    <div
      id="error-display"
      hx-swap-oob="true"
      class="rounded-md bg-red-50 text-red-700 border border-red-400 p-5 mb-4"
    >
      {{ . }}
    </div>
  {{ else }}
    <div id="error-display" hx-swap-oob="true"></div>
  {{ end }}
{{ end }}
