{{ define "error-message" }}
  {{ if . }}
    <div
      id="error-display"
      hx-swap-oob="true"
      class="text-sm rounded-md bg-red-50 text-red-700 border border-red-400 px-5 py-3 mt-4 mb-7"
    >
      {{ . }}
    </div>
  {{ else }}
    <div id="error-display" hx-swap-oob="true"></div>
  {{ end }}
  <!-- empty primary content so HTMX processes the OOB swap -->
  <span></span>
{{ end }}
