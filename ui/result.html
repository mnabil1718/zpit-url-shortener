{{ define "result" }}
  <div
    id="result"
    class="mt-7 p-5 bg-white rounded-lg text-left border border-slate-300"
  >
    <h2 class=" text-center text-xl font-bold mb-7">Your link is ready! 🎉</h2>
    <div
      class="flex flex-col justify-center items-stretch gap-2 p-5 bg-slate-200 rounded-md w-full"
    >
      <a
        href="{{ .Short }}"
        target="_blank"
        class="block w-full min-w-0 truncate text-sky-800 font-bold text-xl tracking-tight hover:underline mb-3 text-center"
      >
        {{ .Short | stripScheme }}
      </a>
      <div class="flex justify-center">
        <button
          onclick="
        navigator.clipboard.writeText('{{ .Short }}');
        this.textContent = 'Copied!';
        setTimeout(() => {
        this.textContent = 'Copy Link';
        }, 2000);
      "
          class="bg-sky-800 text-white px-4 py-3 text-sm font-semibold rounded-md cursor-pointer transition-colors duration-200"
        >
          Copy Link
        </button>
      </div>
    </div>

    {{ if .QRCode }}
      <div class="mt-4 flex flex-col items-center gap-5">
        <img
          src="data:image/png;base64,{{ .QRCode }}"
          alt="QR Code"
          class="max-w-xs aspect-square w-full rounded-md border border-slate-200"
        />

        <a
          href="data:image/png;base64,{{ .QRCode }}"
          download="qr-{{ .Short | stripScheme }}.png"
          class="flex-none bg-sky-800 text-white px-4 py-3 text-sm font-semibold rounded-md cursor-pointer transition-colors duration-200"
        >
          Download QR
        </a>
      </div>
    {{ end }}
  </div>
{{ end }}
