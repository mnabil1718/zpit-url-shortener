{{ define "index" }}
  {{ template "base" . }}
{{ end }}

{{ block "title" . }}Zp.it — Fast, simplified URL shortener{{ end }}

{{ block "content" . }}
  <div class="max-w-3xl mx-auto text-center p-5">
    <h1 class="text-2xl md:text-4xl font-medium mb-3">
      Zp.it - Fast, Simplified URL Shortener
    </h1>
    <p class="text-sm md:text-base text-slate-500 mb-10">
      Create short & memorable link in seconds. For free.
    </p>
    <form hx-post="/generate" hx-target="#result" hx-swap="innerHTML">
      <div class="flex items-center gap-2">
        <input
          id="url"
          type="url"
          name="url"
          pattern="https://.*"
          required
          placeholder="https://example.com/my-long-url"
          class="block w-full rounded-md bg-white px-4.5 py-3 text-base text-slate-600 outline-1 -outline-offset-1 outline-slate-600/30 placeholder:text-slate-400 focus:outline-2 focus:-outline-offset-2 focus:outline-sky-800"
        />
        <button
          type="submit"
          class="cursor-pointer flex-none px-4 py-3 bg-sky-800 text-white rounded-md font-semibold text-sm"
        >
          <span class="htmx-indicator">
            <!-- spinner -->
            <svg
              class="animate-spin size-4 inline"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              />
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8v8z"
              />
            </svg>
          </span>
          <span class="htmx-no-indicator">Shorten</span>
        </button>
      </div>

      <div class="flex items-center gap-2 mt-3">
        <input
          type="checkbox"
          id="qr"
          name="qr"
          class="size-4 accent-sky-800 cursor-pointer"
        />
        <label for="qr" class="text-sm text-slate-500 cursor-pointer"
          >Also generate a QR Code for this link</label
        >
      </div>
    </form>
    <div id="result"></div>
  </div>
{{ end }}
