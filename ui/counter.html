{{ define "counter" }}
  {{ template "counter-base" . }}
{{ end }}

{{ block "counter-title" . }}Zp.it - Shortlink Click Counter{{ end }}

{{ block "counter-content" . }}
  <div class="w-full max-w-3xl mx-auto text-center py-10 px-5">
    <a href="/" class="underline text-sm text-sky-700">Create shortlink</a>
    <div id="error-display"></div>
    <h1 class="text-2xl md:text-4xl font-medium mt-7 mb-3">
      Zp.it - Shortlink Click Counter
    </h1>
    <form
      hx-post="/counter"
      hx-target="#counter-result"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']"
    >
      <!-- MAIN URL INPUT -->
      <input
        id="url"
        type="text"
        name="url"
        required
        placeholder="Enter code or full shortlink"
        class="block w-full rounded-md bg-white px-4.5 py-3 text-base text-slate-600 outline-1 -outline-offset-1 outline-slate-600/30 placeholder:text-slate-400 focus:outline-2 focus:-outline-offset-2 focus:outline-sky-800 mb-2"
      />

      <!-- MAIN SUBMIT BUTTON -->
      <div class="flex w-full justify-center">
        <button
          type="submit"
          class="cursor-pointer flex items-center gap-1 px-4 py-3 bg-sky-800 text-white rounded-md font-semibold text-sm disabled:opacity-50 whitespace-nowrap"
          hx-disabled-elt="this"
        >
          <!-- Spinner -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="animate-spin my-indicator"
          >
            <path d="M12 2v4" />
            <path d="m16.2 7.8 2.9-2.9" />
            <path d="M18 12h4" />
            <path d="m16.2 16.2 2.9 2.9" />
            <path d="M12 18v4" />
            <path d="m4.9 19.1 2.9-2.9" />
            <path d="M2 12h4" />
            <path d="m4.9 4.9 2.9 2.9" />
          </svg>

          <span class="my-indicator">Loading</span>
          <span class="my-no-indicator">Search</span>
        </button>
      </div>
    </form>

    <!-- COUNTER RESULT SECTION -->
    <div id="counter-result"></div>
  </div>
{{ end }}
